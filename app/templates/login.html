<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Legal Case Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #2563eb
            );

            font-family:
            'Segoe UI',
            sans-serif;
        }

        .login-card{

            width:420px;

            background:white;

            padding:40px;

            border-radius:24px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.2);
        }

        .logo-box{

            width:90px;

            height:90px;

            border-radius:50%;

            background:#2563eb;

            color:white;

            display:flex;

            justify-content:center;

            align-items:center;

            margin:auto;

            margin-bottom:20px;

            font-size:35px;
        }

        h2{

            text-align:center;

            margin-bottom:30px;

            font-weight:bold;
        }

        .form-control{

            height:52px;

            border-radius:12px;
        }

        .btn-login{

            height:52px;

            border-radius:12px;

            font-weight:600;

            font-size:18px;
        }

        .loading-spinner{

            display:none;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo-box">

        <i class="fa-solid fa-scale-balanced"></i>

    </div>

    <h2>

        Legal Case Login

    </h2>

    <form
        onsubmit="loginUser(event)"
    >

        <div class="mb-3">

            <label class="mb-2">

                Email

            </label>

            <input
                type="email"
                id="email"
                class="form-control"
                required
            >

        </div>

        <div class="mb-4">

            <label class="mb-2">

                Password

            </label>

            <input
                type="password"
                id="password"
                class="form-control"
                required
            >

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100 btn-login"
            id="loginBtn"
        >

            <span id="loginText">

                Login

            </span>

            <span
                class="spinner-border spinner-border-sm loading-spinner"
                id="loadingSpinner"
            ></span>

        </button>

    </form>

</div>


<script>



// =========================
// AUTO REDIRECT
// =========================

if(

    localStorage.getItem(
        "access_token"
    )
){

    window.location.href =
    "/dashboard-page"
}



// =========================
// LOGIN FUNCTION
// =========================

async function loginUser(event){

    event.preventDefault()


    const email =
    document.getElementById(
        "email"
    ).value


    const password =
    document.getElementById(
        "password"
    ).value



    const loginBtn =
    document.getElementById(
        "loginBtn"
    )

    const loadingSpinner =
    document.getElementById(
        "loadingSpinner"
    )

    const loginText =
    document.getElementById(
        "loginText"
    )



    // LOADING STATE
    loginBtn.disabled = true

    loadingSpinner.style.display =
    "inline-block"

    loginText.innerText =
    "Logging in..."



    try{

        const response =
        await fetch(

            `${window.location.origin}/auth/login`,

            {

                method:"POST",

                headers:{

                    "Content-Type":
                    "application/x-www-form-urlencoded"
                },

                body:new URLSearchParams({

                    username:email,

                    password:password
                })
            }
        )



        const data =
        await response.json()



        if(!response.ok){

            alert(

                data.detail ||
                "Login Failed"
            )

            resetLoginButton()

            return
        }



        // CLEAR OLD DATA
        localStorage.clear()



        // SAVE TOKEN
        localStorage.setItem(

            "access_token",

            data.access_token
        )



        // SAVE USER DATA
        if(data.user){

            localStorage.setItem(

                "user_role",

                data.user.role
            )

            localStorage.setItem(

                "user_email",

                data.user.email
            )

            localStorage.setItem(

                "user_name",

                data.user.full_name
            )

            localStorage.setItem(

                "user_id",

                data.user.id
            )
        }



        console.log(

            "TOKEN SAVED:",

            localStorage.getItem(
                "access_token"
            )
        )



        alert(
            "Login Successful"
        )



        // REDIRECT
        window.location.href =
        "/dashboard-page"

    }

    catch(error){

        console.log(error)

        alert(
            "Server Error"
        )
    }



    resetLoginButton()
}



// =========================
// RESET BUTTON
// =========================

function resetLoginButton(){

    const loginBtn =
    document.getElementById(
        "loginBtn"
    )

    const loadingSpinner =
    document.getElementById(
        "loadingSpinner"
    )

    const loginText =
    document.getElementById(
        "loginText"
    )

    loginBtn.disabled = false

    loadingSpinner.style.display =
    "none"

    loginText.innerText =
    "Login"
}

</script>

</body>
</html>
